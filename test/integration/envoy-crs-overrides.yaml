    output:
      log:
        no_expect_ids: [941110]

  - rule_id: 941120
    test_ids: [49, 50]
    reason: "Envoy removes the syntactically invalid Referer values; encoded valid-URL equivalents are blocked by 941120 in the smoke suite."
    output:
      log:
        no_expect_ids: [941120]

  - rule_id: 942131
    test_ids: [3, 5, 7]
    reason: "libmodsecurity v3 logs the first part of this chained rule; retain the upstream-maintained connector expectation."
    output:
      log:
        expect_ids: [942131]

  - rule_id: 942280
    test_ids: [3]
    reason: "Envoy removes the syntactically invalid Referer value; an encoded valid-URL equivalent is blocked by 942280 in the smoke suite."
    output:
      log:
        no_expect_ids: [942280]

  - rule_id: 944100
    test_ids: [11, 12, 15, 16]
    reason: "libmodsecurity v3 exposes REQUEST_BODY for these XML cases, matching the upstream-maintained connector expectation."
    output:
      log:
        expect_ids: [944100]

  - rule_id: 944110
    test_ids: [11, 12, 15, 16]
    reason: "libmodsecurity v3 exposes REQUEST_BODY for these XML cases, matching the upstream-maintained connector expectation."
    output:
      log:
        expect_ids: [944110]

  - rule_id: 944120
    test_ids: [6, 7, 23, 24, 40, 41, 57, 58, 74, 75, 91, 92, 108, 109, 125, 126]
    reason: "libmodsecurity v3 exposes REQUEST_BODY for these XML cases, matching the upstream-maintained connector expectation."
    output:
      log:
        expect_ids: [944120]

  - rule_id: 944210
    test_ids: [6, 7, 23, 24, 40, 41]
    reason: "libmodsecurity v3 exposes REQUEST_BODY for these XML cases, matching the upstream-maintained connector expectation."
    output:
      log:
        expect_ids: [944210]

  - rule_id: 980170
    test_ids: [1, 2]
    reason: "libmodsecurity v3 does not emit an audit entry for a rule carrying noauditlog, matching the upstream-maintained connector expectation."
    output:
      log:
        no_expect_ids: [980170]
