name: waf-engine-comparison

on:
  push:
    branches:
      - codex/linux-waf-pgo-benchmark
  workflow_dispatch:
    inputs:
      repeats:
        description: Number of order-rotated measurement repeats
        required: true
        default: 3
        type: number
      request_scale:
        description: Multiplier applied to measurement request counts
        required: true
        default: 1
        type: number
      pgo_training_request_scale:
        description: Multiplier applied to PGO training request counts
        required: true
        default: 1
        type: number

permissions:
  contents: read

concurrency:
  group: waf-engine-comparison-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compare:
    name: Linux release ThinLTO PGO
    runs-on: ubuntu-24.04
    timeout-minutes: 360

    steps:
      - name: Detect runner data disk
        id: disk
        shell: bash
        run: |
          mnt_available=false
          if mountpoint --quiet /mnt; then
            mnt_available=true
          fi
          echo "mnt-available=${mnt_available}" >> "${GITHUB_OUTPUT}"

      - name: Use runner data disk
        if: steps.disk.outputs.mnt-available == 'true'
        uses: envoyproxy/toolshed/actions/bind-mounts@1f5b552c6749502b885cb8cf23549b929e745547 # actions-v0.4.17
        with:
          mounts: |
            - src: /mnt/docker
              target: /var/lib/docker
              rm: true
              command-pre: sudo systemctl stop docker
              command-post: sudo systemctl start docker
            - src: /mnt/workspace
              target: GITHUB_WORKSPACE
              chown: runner:runner
            - src: /mnt/envoy-build
              target: RUNNER_TEMP/envoy-build
              chown: runner:runner

      - name: Free root disk space
        if: steps.disk.outputs.mnt-available != 'true'
        uses: envoyproxy/toolshed/actions/diskspace@1f5b552c6749502b885cb8cf23549b929e745547 # actions-v0.4.17
        with:
          background: false

      - name: Check out pinned project sources
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          submodules: recursive

      # Keep the comparison module independent from the production dependency graph. The release
      # tag resolves to this commit, and the benchmark records the module binary checksum.
      - name: Check out pinned comparison module sources
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: tetratelabs/built-on-envoy
          ref: 82b1f9357429aa171d6788a4901db54033f1dd00 # v0.6.2
          fetch-depth: 1
          path: .waf-comparison/built-on-envoy

      - name: Set up pinned Go toolchain
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: .waf-comparison/built-on-envoy/extensions/composer/go.mod
          cache-dependency-path: .waf-comparison/built-on-envoy/extensions/composer/go.sum

      - name: Build comparison module
        env:
          GOPROXY: https://proxy.golang.org
        run: make -C .waf-comparison/built-on-envoy/extensions/composer build

      - name: Build, train, and compare in pinned Envoy image
        env:
          BENCHMARK_REPEATS: ${{ inputs.repeats }}
          BENCHMARK_REQUEST_SCALE: ${{ inputs.request_scale }}
          BUILDBUDDY_API_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}
          CORAZA_MODULE: /source/.waf-comparison/built-on-envoy/extensions/composer/libcomposer.so
          ENVOY_BUILD_IMAGE: docker.io/envoyproxy/envoy-build@sha256:9e7dee3f9ce05274cfeb79a629b6b4f9163edb7bed436daa567ca7b58a35dfac
          ENVOY_DOCKER_BUILD_DIR: ${{ runner.temp }}/envoy-build
          PGO_TRAINING_REQUEST_SCALE: ${{ inputs.pgo_training_request_scale }}
          SOURCE_DIR: ${{ github.workspace }}
        run: |
          mkdir --parents "${ENVOY_DOCKER_BUILD_DIR}"
          docker run --rm \
            --user root:root \
            --volume "${ENVOY_DOCKER_BUILD_DIR}:/build" \
            --volume "${SOURCE_DIR}:/source" \
            --workdir /source \
            --env BENCHMARK_REPEATS \
            --env BENCHMARK_REQUEST_SCALE \
            --env BUILDBUDDY_API_KEY \
            --env CORAZA_MODULE \
            --env ENVOY_BUILD_IMAGE \
            --env HOME=/build \
            --env PGO_TRAINING_REQUEST_SCALE \
            --entrypoint /bin/bash \
            "${ENVOY_BUILD_IMAGE}" \
            ./tools/ci-waf-engine-comparison.sh

      - name: Publish comparison summary
        if: ${{ always() && hashFiles('artifacts/waf-engine-comparison/waf-engine-comparison.md') != '' }}
        run: cat artifacts/waf-engine-comparison/waf-engine-comparison.md >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload comparison report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: waf-engine-comparison-linux-amd64
          path: artifacts/waf-engine-comparison/
          if-no-files-found: warn
          retention-days: 30

      - name: Report disk usage
        if: always()
        run: df --human-readable
