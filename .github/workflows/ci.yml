name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    # Match the build environment pinned by the Envoy v1.39.0 submodule. The image includes the
    # legacy libtinfo runtime required by Envoy's hermetic LLVM 18 toolchain.
    container:
      image: docker.io/envoyproxy/envoy-build:v0.1.6@sha256:0b285a2c5e8fd85db238a6159f9748dac38569f081501bd508876076fecc3fe5

    steps:
      - name: Check out pinned sources
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Install ModSecurity build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes autoconf automake libpcre2-dev libtool libyajl-dev pkg-config

      - name: Verify dependency pins
        run: ./tools/verify-dependency-pins.sh

      - name: Set up Bazel
        uses: bazel-contrib/setup-bazel@c5acdfb288317d0b5c0bbd7a396a3dc868bb0f86 # 0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true

      - name: Build API and run engine, filter, and custom Envoy HTTP tests
        run: make check
