name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build
    runs-on: ubuntu-24.04
    timeout-minutes: 180

    steps:
      - name: Detect runner data disk
        id: disk
        shell: bash
        run: |
          mnt_available=false
          if mountpoint --quiet /mnt; then
            mnt_available=true
          fi
          echo "mnt-available=${mnt_available}" >> "${GITHUB_OUTPUT}"

      # Envoy uses the runner data disk for Docker, the checkout, and Bazel outputs. Keeping these
      # large trees off the root filesystem prevents local Envoy builds from exhausting it.
      - name: Use runner data disk
        if: steps.disk.outputs.mnt-available == 'true'
        uses: envoyproxy/toolshed/actions/bind-mounts@1f5b552c6749502b885cb8cf23549b929e745547 # actions-v0.4.17
        with:
          mounts: |
            - src: /mnt/docker
              target: /var/lib/docker
              rm: true
              command-pre: sudo systemctl stop docker
              command-post: sudo systemctl start docker
            - src: /mnt/workspace
              target: GITHUB_WORKSPACE
              chown: runner:runner
            - src: /mnt/envoy-build
              target: RUNNER_TEMP/envoy-build
              chown: runner:runner

      - name: Free root disk space
        if: steps.disk.outputs.mnt-available != 'true'
        uses: envoyproxy/toolshed/actions/diskspace@1f5b552c6749502b885cb8cf23549b929e745547 # actions-v0.4.17
        with:
          background: false

      - name: Report initial disk usage
        run: df --human-readable

      - name: Check out pinned sources
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          submodules: recursive

      # Match the devtools environment pinned by the Envoy v1.39.0 submodule. The image includes
      # the legacy libtinfo runtime required by Envoy's hermetic LLVM 18 toolchain.
      - name: Build in pinned Envoy image
        env:
          BUILDBUDDY_API_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}
          ENVOY_BUILD_IMAGE: docker.io/envoyproxy/envoy-build@sha256:9e7dee3f9ce05274cfeb79a629b6b4f9163edb7bed436daa567ca7b58a35dfac
          ENVOY_DOCKER_BUILD_DIR: ${{ runner.temp }}/envoy-build
          SOURCE_DIR: ${{ github.workspace }}
        run: |
          mkdir --parents "${ENVOY_DOCKER_BUILD_DIR}"
          docker run --rm \
            --user root:root \
            --volume "${ENVOY_DOCKER_BUILD_DIR}:/build" \
            --volume "${SOURCE_DIR}:/source" \
            --workdir /source \
            --env BUILDBUDDY_API_KEY \
            --env ENVOY_BUILD_IMAGE \
            --env HOME=/build \
            --entrypoint /bin/bash \
            "${ENVOY_BUILD_IMAGE}" \
            ./tools/ci-envoy-build.sh build

      - name: Report disk usage
        if: always()
        run: df --human-readable

  verify:
    name: ${{ matrix.name }}
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: qa
            mode: qa
          - name: sanitizers
            mode: sanitizers

    steps:
      - name: Detect runner data disk
        id: disk
        shell: bash
        run: |
          mnt_available=false
          if mountpoint --quiet /mnt; then
            mnt_available=true
          fi
          echo "mnt-available=${mnt_available}" >> "${GITHUB_OUTPUT}"

      # Each verification job receives an isolated runner. BuildBuddy supplies reusable Bazel
      # outputs from the build job; sanitizer configurations still compile distinct artifacts.
      - name: Use runner data disk
        if: steps.disk.outputs.mnt-available == 'true'
        uses: envoyproxy/toolshed/actions/bind-mounts@1f5b552c6749502b885cb8cf23549b929e745547 # actions-v0.4.17
        with:
          mounts: |
            - src: /mnt/docker
              target: /var/lib/docker
              rm: true
              command-pre: sudo systemctl stop docker
              command-post: sudo systemctl start docker
            - src: /mnt/workspace
              target: GITHUB_WORKSPACE
              chown: runner:runner
            - src: /mnt/envoy-build
              target: RUNNER_TEMP/envoy-build
              chown: runner:runner

      - name: Free root disk space
        if: steps.disk.outputs.mnt-available != 'true'
        uses: envoyproxy/toolshed/actions/diskspace@1f5b552c6749502b885cb8cf23549b929e745547 # actions-v0.4.17
        with:
          background: false

      - name: Report initial disk usage
        run: df --human-readable

      - name: Check out pinned sources
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Run ${{ matrix.name }} in pinned Envoy build image
        env:
          BUILDBUDDY_API_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}
          ENVOY_BUILD_IMAGE: docker.io/envoyproxy/envoy-build@sha256:9e7dee3f9ce05274cfeb79a629b6b4f9163edb7bed436daa567ca7b58a35dfac
          ENVOY_DOCKER_BUILD_DIR: ${{ runner.temp }}/envoy-build
          SOURCE_DIR: ${{ github.workspace }}
        run: |
          mkdir --parents "${ENVOY_DOCKER_BUILD_DIR}"
          docker run --rm \
            --user root:root \
            --volume "${ENVOY_DOCKER_BUILD_DIR}:/build" \
            --volume "${SOURCE_DIR}:/source" \
            --workdir /source \
            --env BUILDBUDDY_API_KEY \
            --env ENVOY_BUILD_IMAGE \
            --env HOME=/build \
            --entrypoint /bin/bash \
            "${ENVOY_BUILD_IMAGE}" \
            ./tools/ci-envoy-build.sh "${{ matrix.mode }}"

      - name: Prepare QA report summary
        id: qa_summary
        if: ${{ always() && matrix.mode == 'qa' }}
        env:
          PREVIEW_DIRECTORY: ${{ runner.temp }}/ci-report-previews
          SUMMARY_PATH: ${{ runner.temp }}/qa-summary.md
        run: |
          python3 tools/ci-report-summary.py \
            --summary-output "${SUMMARY_PATH}" \
            --preview-directory "${PREVIEW_DIRECTORY}"

          crs_preview=false
          qualification_preview=false
          body_pressure_preview=false
          if [[ -f "${PREVIEW_DIRECTORY}/crs-compatibility-report.md" ]]; then
            crs_preview=true
          fi
          if [[ -f "${PREVIEW_DIRECTORY}/qualification-benchmark-report.md" ]]; then
            qualification_preview=true
          fi
          if [[ -f "${PREVIEW_DIRECTORY}/body-pressure-stress-report.md" ]]; then
            body_pressure_preview=true
          fi
          echo "crs_preview=${crs_preview}" >> "${GITHUB_OUTPUT}"
          echo "qualification_preview=${qualification_preview}" >> "${GITHUB_OUTPUT}"
          echo "body_pressure_preview=${body_pressure_preview}" >> "${GITHUB_OUTPUT}"

      - name: Upload CRS compatibility report
        id: crs_artifact
        if: ${{ always() && matrix.mode == 'qa' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: crs-compatibility-linux-amd64
          path: artifacts/crs-compatibility-linux-amd64/
          if-no-files-found: warn
          retention-days: 30

      - name: Upload qualification benchmark
        id: qualification_artifact
        if: ${{ always() && matrix.mode == 'qa' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: qualification-benchmark-linux-amd64
          path: artifacts/qualification-benchmark/
          if-no-files-found: warn
          retention-days: 30

      - name: Upload body-pressure benchmark
        id: body_pressure_artifact
        if: ${{ always() && matrix.mode == 'qa' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: body-pressure-stress-linux-amd64
          path: artifacts/body-pressure-stress/
          if-no-files-found: warn
          retention-days: 30

      - name: Upload CRS report preview
        id: crs_preview
        if: ${{ always() && matrix.mode == 'qa' && steps.qa_summary.outputs.crs_preview == 'true' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          path: ${{ runner.temp }}/ci-report-previews/crs-compatibility-report.md
          archive: false
          retention-days: 30

      - name: Upload qualification report preview
        id: qualification_preview
        if: ${{ always() && matrix.mode == 'qa' && steps.qa_summary.outputs.qualification_preview == 'true' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          path: ${{ runner.temp }}/ci-report-previews/qualification-benchmark-report.md
          archive: false
          retention-days: 30

      - name: Upload body-pressure report preview
        id: body_pressure_preview
        if: ${{ always() && matrix.mode == 'qa' && steps.qa_summary.outputs.body_pressure_preview == 'true' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          path: ${{ runner.temp }}/ci-report-previews/body-pressure-stress-report.md
          archive: false
          retention-days: 30

      - name: Publish QA report summary
        if: ${{ always() && matrix.mode == 'qa' }}
        env:
          SUMMARY_PATH: ${{ runner.temp }}/qa-summary.md
          CRS_PREVIEW_URL: ${{ steps.crs_preview.outputs.artifact-url }}
          QUALIFICATION_PREVIEW_URL: ${{ steps.qualification_preview.outputs.artifact-url }}
          BODY_PRESSURE_PREVIEW_URL: ${{ steps.body_pressure_preview.outputs.artifact-url }}
          CRS_ARTIFACT_URL: ${{ steps.crs_artifact.outputs.artifact-url }}
          QUALIFICATION_ARTIFACT_URL: ${{ steps.qualification_artifact.outputs.artifact-url }}
          BODY_PRESSURE_ARTIFACT_URL: ${{ steps.body_pressure_artifact.outputs.artifact-url }}
        run: |
          if [[ -f "${SUMMARY_PATH}" ]]; then
            cat "${SUMMARY_PATH}" >> "${GITHUB_STEP_SUMMARY}"
          else
            echo "# QA report preview" >> "${GITHUB_STEP_SUMMARY}"
            echo "" >> "${GITHUB_STEP_SUMMARY}"
            echo "> The QA summary could not be generated." >> "${GITHUB_STEP_SUMMARY}"
          fi

          {
            echo ""
            echo "## Report links"
            echo ""
            if [[ -n "${CRS_PREVIEW_URL}" ]]; then
              echo "- [Open OWASP CRS Markdown preview](${CRS_PREVIEW_URL})"
            fi
            if [[ -n "${QUALIFICATION_PREVIEW_URL}" ]]; then
              echo "- [Open qualification benchmark preview](${QUALIFICATION_PREVIEW_URL})"
            fi
            if [[ -n "${BODY_PRESSURE_PREVIEW_URL}" ]]; then
              echo "- [Open body-pressure stress preview](${BODY_PRESSURE_PREVIEW_URL})"
            fi
            if [[ -n "${CRS_ARTIFACT_URL}" ]]; then
              echo "- [Download complete OWASP CRS evidence](${CRS_ARTIFACT_URL})"
            fi
            if [[ -n "${QUALIFICATION_ARTIFACT_URL}" ]]; then
              echo "- [Download complete qualification evidence](${QUALIFICATION_ARTIFACT_URL})"
            fi
            if [[ -n "${BODY_PRESSURE_ARTIFACT_URL}" ]]; then
              echo "- [Download complete body-pressure evidence](${BODY_PRESSURE_ARTIFACT_URL})"
            fi
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload sanitizer test logs
        if: ${{ always() && matrix.mode == 'sanitizers' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sanitizer-testlogs-linux-amd64
          path: artifacts/sanitizers/
          if-no-files-found: warn
          retention-days: 30

      - name: Report disk usage
        if: always()
        run: df --human-readable
