name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    # Match the devtools environment pinned by the Envoy v1.39.0 submodule. The image includes the
    # legacy libtinfo runtime required by Envoy's hermetic LLVM 18 toolchain.
    container:
      image: docker.io/envoyproxy/envoy-build@sha256:9e7dee3f9ce05274cfeb79a629b6b4f9163edb7bed436daa567ca7b58a35dfac

    steps:
      - name: Check out pinned sources
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Install ModSecurity build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes autoconf automake libpcre2-dev libtool libyajl-dev make pkg-config

      - name: Verify dependency pins
        run: ./tools/verify-dependency-pins.sh

      - name: Prepare Envoy build environment
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          bazel --version
          df --human-readable .

      - name: Build API and run engine, filter, and custom Envoy HTTP tests
        run: make check

      - name: Report disk usage
        if: always()
        run: df --human-readable .
