        no_expect_ids: [932390]

  - rule_id: 934120
    test_ids: [23, 24, 25, 26, 39]
    reason: "Envoy rejects raw non-ASCII request targets before the HTTP filter; the percent-encoded form is covered by the exact-rule smoke suite."
    output:
      status: 400
